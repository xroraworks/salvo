        >

    <!-- ==================================================

    ================================================== -->

            href="https://www.salvonicolosiph.com/"

        <link

            rel="alternate" 
            hreflang="x-default" 
            href="https://www.salvonicolosiph.com/" 
        >
    <!-- ================================================== 
        OPEN GRAPH 
    ================================================== --> 
        <meta 
            property="og:type" 
            content="website" 
        >

        <meta 
            property="og:title" 
        content="Photographer for Events in Catania | Salvo Nicolosi" 
        > 
        
        <meta 
            property="og:description" 
            content="Photographer in Catania for private events, brands, businesses and social content." 
        >
        <meta 
            property="og:url" 
            content="https://www.salvonicolosiph.com/" 
        >

    <!-- ================================================== 
            IMMAGINE DA DEFINIRE PER OG:IMAGE
    ================================================== -->         

        <meta 
            property="og:image" 
            content="https://www.salvonicolosiph.com/assets/images/og/"

        <meta 
            property="og:locale"

        >

            property="og:locale:alternate"

    <!-- ==================================================

    ================================================== -->

        <link
            rel="stylesheet"
            href="./assets/css/style.css"
        >

    <!-- ==================================================
     JAVASCRIPT
    ================================================== -->

        <script

        ></script>

    <body>

            HEADER
    ================================================== -->        

        <header class="site-header">

            <div class="header-container">

                <!-- Menu toggle -->

                <button
                    class="menu-toggle"
                    type="button"
                    aria-expanded="false"
                    aria-controls="main-navigation"
                    aria-label="Open navigation menu"
                >

                    <span class="menu-toggle-line"></span>
                    <span class="menu-toggle-line"></span>
                    <span class="menu-toggle-line"></span>

                </button>

                <!-- Site logo -->

                <a
                    class="site-logo"
                    href="/"
                    aria-label="Salvo Nicolosi - Homepage"
                >

                    <img
                        class="site-logo-image"
                        src="./assets/images/logo/salvo-nicolosi-logo-nero.png"
                        width="240"
                        height="80"
                        alt=""
                    >

                    <img
                        class="site-logo-image site-logo-image-light"
                        src="./assets/images/logo/salvo-nicolosi-logo-bianco.png"
                        width="240"
                        height="80"
                        alt=""
                    >

                </a>                

                <!-- Social navigation -->

                <nav

                    aria-label="Social media"
                >

                    <ul class="social-list">

                        <!-- Instagram -->    

                        <li 
                            class="social-item"
                        >

                            <a
                                class="social-link"
                                href="https://www.instagram.com/salvonicolosi.ph/"
                                target="_blank"
                                rel="noopener noreferrer"
                                aria-label="Instagram"
                            >

                                <img
                                    class="social-icon"
                                    src="./assets/icons/instagram.svg"
                                    width="24"
                                    height="24"
                                    alt=""
                                >

                            </a>

                        </li>

                            <!-- Facebook -->

                        <li 
                            class="social-item"
                        >

                            <a
                                class="social-link"
                                href="https://www.facebook.com/salvonicolosiphotographer?locale=it_IT"
                                target="_blank"
                                rel="noopener noreferrer"
                                aria-label="Facebook"
                            >

                                <img
                                    class="social-icon"
                                    src="./assets/icons/facebook.svg"
                                    width="24"
                                    height="24"
                                    alt=""
                                >

                            </a>

                        </li>

                        <!-- LinkedIn -->

                        <li class="social-item">

                            <a
                                class="social-link"
                                href="https://www.linkedin.com/in/salvonicolosi/"
                                target="_blank"
                                rel="noopener noreferrer"
                                aria-label="LinkedIn"
                            >

                                <img
                                    class="social-icon"
                                    src="./assets/icons/linkedin.svg"
                                    width="24"
                                    height="24"
                                    alt=""
                                >

                            </a>

                        </li>

                    </ul>

                </nav>
                
            </div>

                            <a

                        <li class="main-navigation-item">

                        <li class="main-navigation-item">

                            </a>

                        <li class="main-navigation-item">

                            <a

                            <!-- Contact -->

                            <a
                                class="main-navigation-link"

        </main>
