<!DOCTYPE html>

<html lang="en">
    
    <head>

    <!-- ==================================================
         META
    ================================================== -->

        <meta charset="UTF-8">
        <meta 
            name="viewport" 
            content="width=device-width, initial-scale=1.0"
        >
        
    <!-- ==================================================
         SEO
    ================================================== --> 
        
        <title>Photographer for Events in Catania | Salvo Nicolosi</title>
        
        <meta
            name="description"
            content="Photographer in Catania for private events, companies, restaurants and social content. Discover the portfolio and tell me about your project."
        >

        <meta
            name="robots"
            content="index, follow"
        >
        
        <meta
            name="author"
            content="Salvo Nicolosi"
        >

    <!-- ==================================================
         CANONICAL
    ================================================== --> 

        <link
            rel="canonical"
            href="https://www.fotografosicilia.com/"
        >
    
    <!-- ================================================== 
        HREFLANG 
    ================================================== -->

        <link 
            rel="alternate" 
            hreflang="en" 
            href="https://www.fotografosicilia.com/" 
        >

        <link 
            rel="alternate" 
            hreflang="it" 
            href="https://www.fotografosicilia.it/" 
        >

        <link 
            rel="alternate" 
            hreflang="x-default" 
            href="https://www.fotografosicilia.com/" 
        >
    <!-- ================================================== 
        OPEN GRAPH 
    ================================================== --> 
        <meta 
            property="og:type" 
            content="website" 
        >

        <meta 
            property="og:title" 
        content="Photographer for Events in Catania | Salvo Nicolosi" 
        > 
        
        <meta 
            property="og:description" 
            content="Photographer in Catania for private events, brands, businesses and social content." 
        >
        <meta 
            property="og:url" 
            content="https://www.fotografosicilia.com/" 
        >

    <!-- ================================================== 
            IMMAGINE DA DEFINIRE PER OG:IMAGE
    ================================================== -->         

        <meta 
            property="og:image" 
            content="https://www.fotografosicilia.com/assets/images/og/" 
        >
        <meta 
            property="og:image:alt" 
            content="Photography portfolio of Salvo Nicolosi" 
        >
        
        <meta 
            property="og:locale" 
            content="en_GB" 
        >

        <meta
            property="og:locale:alternate"
            content="it_IT"
        >

        <meta 
            property="og:site_name" 
            content="Salvo Nicolosi" 
        >
    
    </head>

    <body>

    <!-- ================================================== 
            HEADER
    ================================================== -->        

        <header class="site-header">

            <div class="header-container">

                <!-- Menu toggle -->

                <button
                    class="menu-toggle"
                    type="button"
                    aria-expanded="false"
                    aria-controls="main-navigation"
                    aria-label="Open navigation menu"
                >

                    <span class="menu-toggle-line"></span>
                    <span class="menu-toggle-line"></span>
                    <span class="menu-toggle-line"></span>

                </button>

                <!-- Site logo -->

                <a
                    class="site-logo"
                    href="/"
                    aria-label="Salvo Nicolosi - Homepage"
                >

                    <img
                        class="site-logo-image"
                        src="/assets/images/logo/salvo-nicolosi-logo.png"
                        width="240"
                        height="80"
                        alt=""
                    >

                </a>                

                <!-- Social navigation -->

                <nav 
                    class="social-navigation"
                    aria-label="Social media"
                >

                    <ul class="social-list">

                        <!-- Instagram -->    

                        <li 
                            class="social-item"
                        >

                            <a
                                class="social-link"
                                href="URL_INSTAGRAM"
                                target="_blank"
                                rel="noopener noreferrer"
                                aria-label="Instagram"
                            >

                                <img
                                    class="social-icon"
                                    src="/assets/icons/instagram.svg"
                                    width="24"
                                    height="24"
                                    alt=""
                                >

                            </a>

                        </li>

                            <!-- Facebook -->

                        <li 
                            class="social-item"
                        >

                            <a
                                class="social-link"
                                href="URL_FACEBOOK"
                                target="_blank"
                                rel="noopener noreferrer"
                                aria-label="Facebook"
                            >

                                <img
                                    class="social-icon"
                                    src="/assets/icons/facebook.svg"
                                    width="24"
                                    height="24"
                                    alt=""
                                >

                            </a>

                        </li>

                        <!-- LinkedIn -->

                        <li class="social-item">

                            <a
                                class="social-link"
                                href="URL_LINKEDIN"
                                target="_blank"
                                rel="noopener noreferrer"
                                aria-label="LinkedIn"
                            >

                                <img
                                    class="social-icon"
                                    src="/assets/icons/linkedin.svg"
                                    width="24"
                                    height="24"
                                    alt=""
                                >

                            </a>

                        </li>

                    </ul>

                </nav>

            </div>

        </header>

        <main>

        </main>

        <footer>

        </footer>

</html>
